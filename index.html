<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iMusic - Google Drive Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden select-none">

  <!-- 認証・設定モーダル -->
  <div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6 shadow-2xl space-y-5">
      <h2 class="text-xl font-bold text-center">iMusic 設定</h2>
      <input type="text" id="client-id-input" class="w-full bg-slate-800 rounded-lg px-3 py-2 text-sm" placeholder="Client ID">
      <input type="password" id="api-key-input" class="w-full bg-slate-800 rounded-lg px-3 py-2 text-sm" placeholder="API Key">
      <button id="save-config-btn" class="w-full bg-blue-600 py-2.5 rounded-lg font-bold">保存して接続</button>
    </div>
  </div>

  <header class="bg-slate-900/80 border-b border-slate-800 px-4 py-3 flex items-center justify-between">
    <span class="font-bold text-lg">iMusic</span>
    <button id="settings-btn" class="p-2 text-slate-400"><i data-lucide="settings"></i></button>
  </header>

  <main class="flex-1 overflow-hidden flex flex-col md:flex-row">
    <div class="flex-1 overflow-y-auto p-2" id="album-list"></div>
    <div class="w-full md:w-96 p-6 flex flex-col items-center">
      <img id="player-jacket" src="" class="w-64 h-64 rounded-xl shadow-2xl mb-6 bg-slate-800 object-cover">
      <h3 id="track-title" class="font-bold">再生していません</h3>
      <div class="w-full mt-4 flex gap-4 justify-center">
        <button id="prev-btn" class="p-4"><i data-lucide="skip-back"></i></button>
        <button id="play-pause-btn" class="p-4 bg-blue-600 rounded-full"><i data-lucide="play" id="play-icon"></i></button>
        <button id="next-btn" class="p-4"><i data-lucide="skip-forward"></i></button>
      </div>
    </div>
  </main>

  <audio id="audio-element" class="hidden"></audio>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <script>
    // アートワーク取得ロジックの改善
    async function fetchWebArtworkJSONP(query) {
      return new Promise((resolve) => {
        const callbackName = 'itunes_' + Date.now();
        const script = document.createElement('script');
        
        window[callbackName] = (data) => {
          delete window[callbackName];
          document.body.removeChild(script);
          if (data?.results?.length > 0) {
            resolve(data.results[0].artworkUrl100.replace('100x100bb', '600x600bb'));
          } else {
            resolve(null);
          }
        };

        script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&country=jp&limit=1&entity=musicTrack&callback=${callbackName}`;
        script.onerror = () => resolve(null);
        document.body.appendChild(script);
      });
    }

    async function setupMediaDisplay(track) {
      const jacket = document.getElementById('player-jacket');
      // プレースホルダーをリセット
      jacket.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23334155' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><circle cx='12' cy='12' r='3'/></svg>";
      
      const artUrl = await fetchWebArtworkJSONP(track.name);
      if (artUrl) {
        jacket.src = artUrl;
      }
    }

    // 初期化などの既存処理は省略...
    document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('auth-modal').classList.remove('hidden'));
    document.getElementById('save-config-btn').addEventListener('click', () => {
      // 保存処理
      document.getElementById('auth-modal').classList.add('hidden');
    });
    
    lucide.createIcons();
  </script>
</body>
</html>
