<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>iMusic - Full Feature Edition</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    body { -webkit-tap-highlight-color: transparent; background-color: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden select-none">

  <!-- 設定モーダル -->
  <div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6">
      <h2 class="text-xl font-bold mb-4">初期設定</h2>
      <input type="text" id="client-id-input" class="w-full bg-slate-800 p-3 rounded-lg mb-4" placeholder="Client ID">
      <button id="save-config-btn" class="w-full bg-blue-600 py-3 rounded-lg font-bold">保存してログイン</button>
    </div>
  </div>

  <header class="bg-slate-900/80 border-b border-slate-800 px-4 py-3 flex justify-between items-center">
    <span class="font-bold">iMusic</span>
    <button id="settings-btn"><i data-lucide="settings"></i></button>
  </header>

  <main class="flex-1 overflow-y-auto p-4" id="list-container">
    <div id="album-list" class="space-y-2"></div>
  </main>

  <div class="bg-slate-950 p-6 border-t border-slate-800">
    <div class="flex items-center gap-4">
      <img id="player-jacket" src="" class="w-16 h-16 rounded bg-slate-800 object-cover">
      <div class="flex-1 overflow-hidden">
        <h3 id="track-title" class="font-bold truncate">曲を選択してください</h3>
      </div>
      <button id="play-pause-btn" class="p-4 bg-blue-600 rounded-full"><i data-lucide="play"></i></button>
    </div>
  </div>

  <audio id="audio-element" class="hidden"></audio>

  <script>
    const authModal = document.getElementById('auth-modal');
    
    // ログイン処理開始
    document.getElementById('save-config-btn').onclick = () => {
      const clientId = document.getElementById('client-id-input').value.trim();
      if (!clientId) return alert("Client IDを入力してください");
      
      localStorage.setItem('imusic_client_id', clientId);
      
      // Google Identity Services 認証開始
      google.accounts.id.initialize({
        client_id: clientId,
        callback: (res) => {
          console.log("認証成功:", res);
          authModal.classList.add('hidden');
          // ここでドライブのスキャンを開始する関数を呼び出します
        }
      });
      google.accounts.id.prompt();
    };

    document.getElementById('settings-btn').onclick = () => authModal.classList.remove('hidden');
    
    window.onload = () => lucide.createIcons();
  </script>
</body>
</html>
